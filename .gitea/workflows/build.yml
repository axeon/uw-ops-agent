name: build
on:
  push:
    branches: main
env:
  APP_NAME: uw-ops-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build
        run: |
          git config --global user.token ${{ gitea.token }}
          git clone -q ${{gitea.server_url}}/${{ gitea.repository }}.git .
          source ~/.profile
          mvn clean package -Dmaven.test.skip=true