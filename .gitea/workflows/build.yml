name: build
on:
  push:
    branches: [main]
env:
  APP_NAME: uw-ops-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build
        run: |
          # 拉取代码
          source ~/.profile
          GIT_SERVER=${{gitea.server_url}}
          git clone -q ${GIT_SERVER%%://*}://gitea:${{gitea.token}}@${GIT_SERVER#*://}/${{gitea.repository}}.git .

          mkdir -p output

          # Step 1: 打包fat JAR（包含所有依赖和native-image配置）
          echo "Building fat JAR..."
          mvn -B package -Dmaven.test.skip=true
          FAT_JAR=$(ls target/uw-ops-agent-*.jar | head -1)

          # 注册QEMU多架构支持
          [ -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ] || docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

          # Step 2-amd64: native-image容器编译
          echo "Building amd64..."
          docker run --rm --platform linux/amd64 \
            -v $(pwd):/build -w /build \
            container-registry.oracle.com/graalvm/native-image:25 \
            --no-fallback -Os -march=compatibility --enable-http --enable-https --strip-debug-info -R:MaxHeapSize=128m -R:MinHeapSize=8m \
            -o output/uw-ops-agent-amd64 -jar "$FAT_JAR"

          # Step 3-arm64: native-image容器编译
          echo "Building arm64..."
          docker run --rm --platform linux/arm64 \
            -v $(pwd):/build -w /build \
            container-registry.oracle.com/graalvm/native-image:25 \
            --no-fallback -Os -march=compatibility --enable-http --enable-https --strip-debug-info -R:MaxHeapSize=128m -R:MinHeapSize=8m \
            -o output/uw-ops-agent-arm64 -jar "$FAT_JAR"

          # 验证产物
          file output/uw-ops-agent-amd64
          file output/uw-ops-agent-arm64

          # 复制到ops-center并提交
          git clone -q ${GIT_SERVER%%://*}://${GIT_SERVER#*://}/uw/uw-ops-center.git uw-ops-center
          cp -f output/uw-ops-agent-amd64 uw-ops-center/src/main/resources/public/agent/download/uw-ops-agent-amd64
          cp -f output/uw-ops-agent-arm64 uw-ops-center/src/main/resources/public/agent/download/uw-ops-agent-arm64
          cp -f "$FAT_JAR" uw-ops-center/src/main/resources/public/agent/download/uw-ops-agent.jar
          cd uw-ops-center
          git add src/main/resources/public/agent/download/
          git commit -m "uw-ops-agent ci auto build (amd64+arm64)"
          git push origin main
          echo "uw-ops-agent build success!"
